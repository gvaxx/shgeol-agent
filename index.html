<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XML Code Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b; --surface: #141417; --surface2: #1c1c21; --surface3: #27272d;
  --border: #27272a; --border2: #3f3f46;
  --text: #f4f4f5; --text2: #a1a1aa; --text3: #71717a;
  --accent: #3b82f6; --accent2: #2563eb; --accent-dim: rgba(59, 130, 246, 0.1);
  --user-bg: #1e293b; --user-border: rgba(59, 130, 246, 0.2);
  --danger: #ef4444; --green: #10b981; --warning: #f59e0b;
  --radius: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

/* Sidebar */
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: margin-left 0.3s; }
.sidebar.hidden { margin-left: -260px; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.sidebar-header h2 { font-size: 14px; font-weight: 600; color: var(--text); }
.btn-new-chat { background: var(--text); color: var(--bg); border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
.btn-new-chat:hover { opacity: 0.9; }
.chat-list { flex: 1; overflow-y: auto; padding: 12px; }
.chat-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); display: flex; justify-content: space-between; margin-bottom: 4px; }
.chat-item:hover { background: var(--surface2); }
.chat-item.active { background: var(--surface3); color: var(--text); font-weight: 500; }

/* Main Area */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 16px; }
.btn-icon { background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px; border-radius: 6px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
.btn-icon:hover { background: var(--surface2); color: var(--text); }
.model-badge { background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); font-size: 12px; padding: 4px 10px; border-radius: 6px; font-family: var(--mono); margin-left: auto; }

/* Settings panel */
.settings-panel { width: 340px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 24px; display: none; flex-direction: column; gap: 16px; box-shadow: -4px 0 15px rgba(0,0,0,0.1); }
.settings-panel.open { display: flex; }
.settings-panel h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; text-transform: uppercase; }
.settings-panel label { font-size: 12px; font-weight: 500; color: var(--text2); display: block; margin-bottom: 6px; }
.settings-panel input, .settings-panel textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: var(--font); outline: none; transition: 0.2s; }
.settings-panel input:focus, .settings-panel textarea:focus { border-color: var(--accent); }
.settings-panel textarea { resize: vertical; min-height: 80px; font-family: var(--mono); }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
.msg { max-width: 850px; width: 100%; margin: 0 auto; padding: 0; font-size: 14px; line-height: 1.6; word-break: break-word; }
.msg.user { background: var(--user-bg); border: 1px solid var(--user-border); padding: 16px 20px; border-radius: var(--radius); }
.msg.assistant { background: transparent; }

/* XML Formatting */
.xml-thinking { background: rgba(245, 158, 11, 0.05); border-left: 3px solid var(--warning); padding: 12px 16px; margin: 12px 0; border-radius: 4px 8px 8px 4px; font-size: 13px; color: var(--text2); }
.xml-thinking-header { font-weight: 600; color: var(--warning); margin-bottom: 6px; font-size: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
.xml-tool { background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-left: 3px solid var(--green); padding: 12px; margin: 12px 0; border-radius: 4px 8px 8px 4px; }
.xml-tool-header { font-weight: 600; color: var(--green); margin-bottom: 8px; font-size: 12px; font-family: var(--mono); }
.xml-tool-content pre { margin: 0 !important; background: var(--bg) !important; border: 1px solid var(--border) !important; }

/* Markdown Styles */
.msg .msg-content p { margin: 0 0 12px 0; }
.msg .msg-content p:last-child { margin-bottom: 0; }
.msg .msg-content pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 12px 0; font-family: var(--mono); font-size: 13px; line-height: 1.5; }
.msg .msg-content code { font-family: var(--mono); font-size: 13px; background: var(--surface2); padding: 2px 6px; border-radius: 4px; color: #e2e8f0; }
.msg .msg-content pre code { background: none; padding: 0; color: inherit; }

/* Input */
.input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 20px; flex-shrink: 0; }
.input-wrap { max-width: 850px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end; position: relative; }
.input-wrap textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; padding: 14px 48px 14px 16px; font-size: 14px; font-family: var(--font); line-height: 1.5; resize: none; outline: none; max-height: 250px; min-height: 50px; transition: border-color 0.2s; }
.input-wrap textarea:focus { border-color: var(--accent); }
.btn-send { position: absolute; right: 8px; bottom: 8px; background: var(--text); color: var(--bg); border: none; border-radius: 8px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, opacity 0.2s; }
.btn-send:hover { opacity: 0.9; transform: scale(1.05); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 15px; font-weight: 500; }

/* Loading indicator */
.thinking { display: inline-flex; gap: 4px; padding: 14px 0 4px; }
.thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite ease-in-out; }
.thinking span:nth-child(2) { animation-delay: .2s; }
.thinking span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-6px);opacity:1} }

/* Tool call lines */
.tool-calls { margin-bottom: 10px; }
.tool-call-line { font-family: var(--mono); font-size: 11px; color: var(--green); padding: 2px 0; opacity: 0.8; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Agent</h2>
    <button class="btn-new-chat" onclick="clearHistory()">Clear</button>
  </div>
  <div class="chat-list" id="chatList">
    <div class="chat-item active">Current Agent Session</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <button class="btn-icon" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <span class="model-badge" id="modelBadge">gpt-4o</span>
    <button class="btn-icon" onclick="toggleSettings()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>

  <div style="flex:1;display:flex;overflow:hidden">
    <div style="flex:1;display:flex;flex-direction:column;min-width:0">
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">Start a new agent session</div>
      </div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="input" rows="1" placeholder="Ask the agent to build something..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="btn-send" id="btnSend" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <h3>Configuration</h3>
      <div><label>Base URL</label><input id="sBaseUrl" placeholder="https://api.openai.com/v1"></div>
      <div><label>API Key</label><input id="sApiKey" type="password" placeholder="sk-..."></div>
      <div><label>Model</label><input id="sModel" placeholder="gpt-4o"></div>
      <div><label>Working Directory</label><input id="sWorkdir" placeholder="/path/to/project"></div>
      <div><label>Temperature</label><input id="sTemperature" type="number" step="0.1" min="0" max="2" value="0.2"></div>
      <div><label>Max Tokens</label><input id="sMaxTokens" type="number" step="256" min="256" max="128000" value="4096"></div>
      <div><label>Agent Custom Instructions</label><textarea id="sAgentExtraPrompt" rows="3" placeholder="Extra instructions..."></textarea></div>
    </div>
  </div>
</div>

<script>
// --- STATE ---
let S = {
  streaming: false,
};

// --- INIT ---
window.onload = async () => {
  loadSettings();
  await loadHistory();
};

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }

// --- SETTINGS (Local Storage) ---
function loadSettings() {
  const saved = localStorage.getItem('agentSettings');
  if (saved) {
    const s = JSON.parse(saved);
    document.getElementById('sBaseUrl').value = s.base_url || 'https://api.openai.com/v1';
    document.getElementById('sApiKey').value = s.api_key || '';
    document.getElementById('sModel').value = s.model || 'gpt-4o';
    document.getElementById('sWorkdir').value = s.workdir || '.';
    document.getElementById('sTemperature').value = s.temperature ?? 0.2;
    document.getElementById('sMaxTokens').value = s.max_tokens ?? 4096;
    document.getElementById('sAgentExtraPrompt').value = s.agent_extra_prompt || '';
    document.getElementById('modelBadge').textContent = s.model || 'gpt-4o';
  }
}

function getSettings() {
  return {
    base_url: document.getElementById('sBaseUrl').value || 'https://api.openai.com/v1',
    api_key: document.getElementById('sApiKey').value,
    model: document.getElementById('sModel').value || 'gpt-4o',
    workdir: document.getElementById('sWorkdir').value || '.',
    temperature: parseFloat(document.getElementById('sTemperature').value) || 0.2,
    max_tokens: parseInt(document.getElementById('sMaxTokens').value) || 4096,
    agent_extra_prompt: document.getElementById('sAgentExtraPrompt').value
  };
}

// Автосохранение настроек
document.querySelectorAll('.settings-panel input, .settings-panel textarea').forEach(el => {
  el.addEventListener('input', () => {
    localStorage.setItem('agentSettings', JSON.stringify(getSettings()));
    document.getElementById('modelBadge').textContent = document.getElementById('sModel').value;
  });
});

// --- HISTORY LOGIC ---
async function loadHistory() {
  try {
    const r = await fetch('/api/history');
    const msgs = await r.json();
    if (msgs.length > 0) {
      document.getElementById('emptyState')?.remove();
      msgs.forEach(msg => appendMessage(msg.role, msg.content, msg.tool_calls || [], true));
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  } catch (e) { console.error('Failed to load history:', e); }
}

async function clearHistory() {
  await fetch('/api/history', { method: 'DELETE' });
  document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState">Start a new agent session</div>';
}

// --- PARSERS & MARKDOWN ---
function processXML(text) {
  if (!text) return '';

  text = text.replace(/<thinking>([\s\S]*?)<\/thinking>/g, (match, content) => {
    return `<div class="xml-thinking"><div class="xml-thinking-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg> Internal Thought Process</div><div class="xml-thinking-content">${esc(content.trim()).replace(/\n/g, '<br>')}</div></div>`;
  });

  if (text.includes('<thinking>') && !text.includes('</thinking>')) {
    const parts = text.split('<thinking>');
    const content = parts.pop();
    text = parts.join('<thinking>') + `<div class="xml-thinking"><div class="xml-thinking-header">🤔 Thinking...</div><div class="xml-thinking-content">${esc(content.trim()).replace(/\n/g, '<br>')}</div></div>`;
  }

  const toolRegex = /<([a-zA-Z_]+)>([\s\S]*?)<\/\1>/g;
  text = text.replace(toolRegex, (match, tag, content) => {
    if (['div', 'span', 'p', 'pre', 'code', 'html', 'body'].includes(tag.toLowerCase())) return match;
    return `<div class="xml-tool">
              <div class="xml-tool-header">⚡ Tool Call: ${tag}</div>
              <div class="xml-tool-content"><pre><code>${esc(content.trim())}</code></pre></div>
            </div>`;
  });
  return text;
}

function renderMarkdown(text) {
  if (!text) return '';
  let processed = processXML(text);
  processed = processed.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${esc(code.trim())}</code></pre>`);
  processed = processed.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
  processed = processed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  
  const parts = processed.split(/\n\n+/);
  return parts.map(p => {
    if (p.trim().startsWith('<pre>') || p.trim().startsWith('<h') || p.trim().startsWith('<div')) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function appendMessage(role, content, toolCalls = [], isHistoryLoad = false) {
  const el = document.getElementById('messages');
  document.getElementById('emptyState')?.remove();

  const d = document.createElement('div');
  d.className = `msg ${role}`;

  let html = '';
  if (toolCalls && toolCalls.length) {
    html += '<div class="tool-calls">';
    for (const tc of toolCalls) {
      html += `<div class="tool-call-line">⚡ ${esc(tc.summary || tc.tool)}</div>`;
    }
    html += '</div>';
  }
  html += `<div class="msg-content">${renderMarkdown(content)}</div>`;
  d.innerHTML = html;
  el.appendChild(d);

  if (!isHistoryLoad) el.scrollTop = el.scrollHeight;
  return d;
}

// --- UI INTERACTIONS ---
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 250) + 'px';
}

// --- CORE API LOGIC ---
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || S.streaming) return;

  appendMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  S.streaming = true;
  document.getElementById('btnSend').disabled = true;

  try {
    await streamAgent(text);
  } catch (err) {
    appendMessage('assistant', `**Error:** ${err.message}`);
  } finally {
    S.streaming = false;
    document.getElementById('btnSend').disabled = false;
  }
}

async function streamAgent(userMessage) {
  const settings = getSettings();

  // Create assistant bubble with loading indicator
  const msgEl = document.createElement('div');
  msgEl.className = 'msg assistant';
  msgEl.innerHTML = '<div class="tool-calls" id="liveToolCalls"></div><div class="thinking"><span></span><span></span><span></span></div><div class="msg-content"></div>';
  document.getElementById('emptyState')?.remove();
  document.getElementById('messages').appendChild(msgEl);

  const toolCallsEl = msgEl.querySelector('#liveToolCalls');
  const thinkingEl = msgEl.querySelector('.thinking');
  const contentEl = msgEl.querySelector('.msg-content');
  let fullResponse = '';
  let toolCallsSeen = [];

  const response = await fetch('/api/agent/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: userMessage, settings })
  });

  if (!response.ok) throw new Error(`HTTP ${response.status}`);

  const reader = response.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const dataStr = line.slice(6).trim();
      if (dataStr === '[DONE]') continue;
      if (!dataStr) continue;

      try {
        const d = JSON.parse(dataStr);

        if (d.type === 'token') {
          thinkingEl.style.display = 'none';
          fullResponse += d.content;
          contentEl.style.whiteSpace = 'pre-wrap';
          contentEl.textContent = fullResponse;
        } else if (d.type === 'tool') {
          // Show tool call line, reset thinking for next LLM call
          const line = document.createElement('div');
          line.className = 'tool-call-line';
          line.textContent = '⚡ ' + (d.summary || d.tool);
          toolCallsEl.appendChild(line);
          thinkingEl.style.display = '';  // show thinking again while model processes result
          fullResponse = '';              // reset for next LLM response
          contentEl.textContent = '';
          toolCallsSeen.push({ tool: d.tool, summary: d.summary });
        } else if (d.type === 'error') {
          thinkingEl.style.display = 'none';
          fullResponse += `\n\n**Error:** ${d.content}`;
          contentEl.innerHTML = renderMarkdown(fullResponse);
        }
      } catch (e) { console.error('SSE parse error:', e); }
    }

    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  // Final markdown render
  thinkingEl.remove();
  if (fullResponse) {
    contentEl.style.whiteSpace = '';
    contentEl.innerHTML = renderMarkdown(fullResponse);
  }
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}
</script>
</body>
</html>
